<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; media-src 'self' blob:; connect-src 'self' wss://api.whisperai.com" />
  <title>Pro Listener</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" x2="12" y1="19" y2="22"></line>
        </svg>
      </div>
      <div class="header-copy">
        <h1>Pro Listener</h1>
        <p>Capture your computer's audio &amp; transcribe it with WhisperAI</p>
      </div>
    </header>

    <section class="controls" aria-label="Recording controls">
      <div class="field">
        <label for="language">Language</label>
        <select id="language">
          <option value="">Auto detect</option>
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="pt">Portuguese</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="nl">Dutch</option>
          <option value="pl">Polish</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh">Chinese</option>
          <option value="hi">Hindi</option>
          <option value="ar">Arabic</option>
        </select>
      </div>

      <div class="field field-duration">
        <label for="duration">Max duration (s)</label>
        <input id="duration" type="number" min="1" max="3600" value="60" />
      </div>

      <div class="field field-mode">
        <span class="field-label">Real-time</span>
        <label class="switch">
          <input type="checkbox" id="realtime-toggle" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="buttons">
        <button id="btn-record" class="btn btn-record">
          <span class="dot"></span>Record
        </button>
        <button id="btn-stop" class="btn btn-stop" disabled>
          <span class="square"></span>Stop
        </button>
        <button id="btn-transcribe" class="btn btn-transcribe" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3v12"></path>
            <path d="m8 11 4 4 4-4"></path>
            <path d="M4 21h16"></path>
          </svg>
          Transcribe
        </button>
      </div>
    </section>

    <section class="status-row">
      <span id="status-dot" class="status-dot idle"></span>
      <span id="status">Ready — press Record to capture system audio.</span>
      <span id="timer" class="timer" hidden>00:00</span>
    </section>

    <section class="transcript-card" aria-label="Transcript">
      <div class="transcript-head">
        <h2>Transcript</h2>
        <button id="btn-copy" class="btn-ghost" hidden>Copy</button>
      </div>
      <div id="transcript" class="transcript empty">
        Your transcription will appear here.
      </div>
    </section>
  </main>

  <script src="renderer.js"></script>
</body>
</html>
